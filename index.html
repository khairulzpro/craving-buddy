<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apa Nak Makan Tonight? — Modern Malaysian Food Picker</title>
  <!-- Tailwind CSS Play CDN for 100% portable GitHub Pages, raw view, and local static preview -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background 0.8s ease-in-out;
    }
    h1, .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body id="app-body" class="bg-gradient-to-tr from-amber-100 via-orange-50 to-rose-100 min-h-screen flex flex-col items-center justify-center p-4 md:p-8 text-slate-800 selection:bg-orange-200">
  
  <div id="main-card-container" class="max-w-md w-full text-center space-y-6 bg-white/70 backdrop-blur-xl p-6 md:p-8 rounded-3xl border border-white/50 shadow-2xl transition-all duration-300 hover:shadow-orange-200/50 relative">
    
    <!-- Top Decorative Sparkles -->
    <div class="absolute -top-3 -right-3 bg-gradient-to-r from-orange-400 to-rose-500 text-white font-mono text-xs px-3 py-1 rounded-full shadow-md animate-pulse">
      Craving Buddy 🍛
    </div>

    <div class="space-y-1">
      <h1 id="main-title" class="text-4xl md:text-5xl font-black tracking-tight bg-gradient-to-r from-orange-600 via-rose-500 to-amber-500 bg-clip-text text-transparent leading-none py-1 filter drop-shadow-sm">
        Apa nak makan tonight?
      </h1>
      <p id="app-subtitle" class="text-sm font-medium text-slate-500">
        Mouth-watering local decisions, made in just one tap!
      </p>
    </div>
    
    <!-- Decision Stage & Canvas Area -->
    <div id="result-box" class="min-h-56 flex flex-col items-center justify-center bg-white/80 p-5 rounded-2xl border border-orange-100/60 relative overflow-hidden transition-all duration-300 shadow-inner">
      <!-- Confetti Canvas overlay -->
      <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none w-full h-full z-10"></canvas>
      
      <!-- Inside Card Contents -->
      <div id="instructions" class="text-slate-400 text-sm font-semibold flex flex-col items-center gap-2 z-0">
        <span class="text-3xl animate-bounce duration-1000">👇</span>
        Press the button to spin the wheel!
      </div>
      
      <div id="emoji-display" class="text-8xl mb-3 transition-transform duration-500 scale-0 z-0"></div>
      
      <div id="text-display" class="text-3xl font-extrabold text-slate-800 tracking-tight transition-all duration-500 opacity-0 transform translate-y-2 z-0"></div>
      
      <!-- Selected Sub-text and Characteristics -->
      <div id="info-box" class="mt-3 text-center transition-all duration-500 max-h-0 opacity-0 overflow-hidden space-y-2 z-0">
        <span id="dish-tag" class="inline-block bg-orange-100 text-orange-700 font-bold text-xs uppercase tracking-wider px-2.5 py-1 rounded-full"></span>
        <p id="dish-description" class="text-slate-500 text-xs px-4 leading-relaxed"></p>
        
        <!-- Utility Action Row -->
        <div id="action-row" class="pt-3 flex items-center justify-center gap-2">
          <!-- Google Maps button -->
          <a id="btn-maps" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-sky-50 hover:bg-sky-100 text-sky-700 font-semibold text-xs rounded-lg transition-colors border border-sky-200/50 shadow-sm cursor-pointer">
            🗺️ Cari kat Maps
          </a>
          <!-- Copy Decision button -->
          <button id="btn-copy" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold text-xs rounded-lg transition-colors border border-emerald-200/50 shadow-sm cursor-pointer">
            📋 Salin (Share)
          </button>
        </div>
      </div>
    </div>

    <!-- The Huge Spin Trigger Button -->
    <button id="pick-btn" class="w-full py-4 px-8 bg-gradient-to-r from-orange-500 via-amber-500 to-rose-500 text-white font-black text-xl rounded-2xl shadow-lg hover:shadow-orange-500/30 active:scale-95 cursor-pointer select-none transition-all duration-150 border-b-4 border-orange-700 hover:brightness-105 active:border-b-0">
      Pilih untuk saya! ⚡
    </button>

    <!-- Customizer Drawer Container -->
    <div id="customizer-section" class="border-t border-slate-100 pt-3">
      <button id="toggle-drawer-btn" class="text-xs font-semibold text-slate-500 hover:text-orange-600 transition-colors flex items-center justify-center gap-1.5 mx-auto py-1 px-4 rounded-full bg-slate-50 border border-slate-100/50 cursor-pointer">
        ⚙️ Sesuaikan Menu Makanan (<span id="total-active-count">10</span>)
        <span id="drawer-arrow" class="transition-transform duration-300 inline-block">▼</span>
      </button>

      <!-- Preferences Drawer Content -->
      <div id="drawer-content" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out text-left space-y-4">
        <div class="pt-3 space-y-2">
          <p class="text-xs font-semibold text-slate-400">Pilih hidangan yang aktif dalam putaran:</p>
          
          <!-- Food Chips Grid -->
          <div id="chips-grid" class="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto pr-1"></div>
        </div>

        <!-- Add Custom Food Form -->
        <div id="add-food-container" class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2">
          <div class="text-xs font-semibold text-slate-500 flex justify-between items-center">
            <span>Tambah makanan kegemaran anda:</span>
            <span class="text-[10px] text-slate-400 font-medium">Auto emoji 🍕</span>
          </div>
          <form id="add-food-form" class="flex gap-1.5" onsubmit="event.preventDefault();">
            <input id="input-new-food" type="text" placeholder="Contoh: Roti Naan, Burger..." max="30" required class="flex-1 text-xs px-3 py-2 bg-white rounded-lg border border-slate-200 focus:outline-none focus:border-orange-400 text-slate-700 font-medium" />
            <button id="btn-submit-food" type="submit" class="bg-gradient-to-r from-orange-500 to-rose-500 hover:brightness-105 active:scale-95 text-white font-bold text-xs px-4 py-2 rounded-lg cursor-pointer transition-transform">
              Tambah
            </button>
          </form>
        </div>

        <!-- Reset Button -->
        <button id="btn-reset-menu" class="w-full text-center text-[10px] text-slate-400 hover:text-rose-500 transition-colors font-semibold uppercase tracking-wider">
          🔄 Tetap Semula Menu Asal (Reset)
        </button>
      </div>
    </div>
  </div>

  <script>
    // Traditional Malaysian Dishes plus detailed meta fields
    const defaultDishes = [
      { name: 'Nasi Lemak', emoji: '🍛', desc: 'Savoury coconut rice cooked with fragrant pandan, accompanied by sweet-spicy sambal, crisp anchovies, roasted peanuts, and a boiled egg!', tag: 'National Favorite 🇲🇾', colors: ['#f0fdf4', '#dcfce7', '#10b981', '#047857'] }, // green-ish theme
      { name: 'Roti Canai', emoji: '🫓', desc: 'A crispy, flaky round flatbread with soft layers, tossed and spun to perfection. Perfect when dipped into spicy dhal or fragrant curry!', tag: 'Flaky & Buttery 🫓', colors: ['#fffbeb', '#fef3c7', '#f59e0b', '#b45309'] }, // amber theme
      { name: 'Laksa', emoji: '🍜', desc: 'A rich, creamy, or sour noodle soup. Infused with aromatic torch ginger, lemongrass, mackerel flakes, and topped with pineapple and mint!', tag: 'Rich & Tangy 🌶️', colors: ['#fff5f5', '#fee2e2', '#f43f5e', '#be123c'] }, // rose/red theme
      { name: 'Satay', emoji: '🍢', desc: 'Skewers of perfectly marinated spiced chicken or beef, flame-grilled over burning charcoal. Served with a thick, luscious peanut dipping sauce!', tag: 'Smoky Charcoal 🍢', colors: ['#fff8f1', '#ffedd5', '#f97316', '#c2410c'] }, // orange theme
      { name: 'Mee Goreng', emoji: '🍝', desc: 'Stir-fried yellow noodles packed with prawns, sliced tofu, crispy fritters, vegetables, and seasoned with local rich bean paste and soy sauce!', tag: 'Wok-Hei Spice 🌶️', colors: ['#fef2f2', '#fee2e2', '#ef4444', '#b91c1c'] }, // red theme
      { name: 'Cendol', emoji: '🍧', desc: 'Chaved ice dessert generously loaded with coconut milk, authentic sweet Gula Melaka (palm sugar solution), and green worm-like pandan jelly!', tag: 'Ice Cold Sweet 🍧', colors: ['#f0fdf4', '#ecfdf5', '#10b981', '#065f46'] }, // emerald/minty
      { name: 'Rendang', emoji: '🥩', desc: 'Slow-simmered rich beef caramelized over hours in a spicy herbal thick broth of lemongrass, kaffir lime leaves, and toasted fresh coconut!', tag: 'Deep Spiced Curry 🥩', colors: ['#fffcf6', '#fafaf9', '#78350f', '#451a03'] }, // brown theme
      { name: 'Teh Tarik', emoji: '☕', desc: 'Fresh strong black tea pulled repeatedly with condensed milk to create a rich, frothy, aerated sweet beverage that is uniquely creamy.', tag: 'Frothy Pulled Tea ☕', colors: ['#faf7f2', '#f3ebd9', '#d97706', '#92400e'] }, // milky-tea orange
      { name: 'Mee Rebus', emoji: '🍲', desc: 'Warm yellow noodles doused in a thick, hearty, aromatic gravy composed of sweet potatoes, fried shallots, chilies, egg, and fresh calamansi!', tag: 'Sweet Potato Gravy 🍲', colors: ['#fefdf0', '#fef9c3', '#ca8a04', '#854d0e'] }, // warm yellow
      { name: 'Nasi Kerabu', emoji: '🍚', desc: 'Mesmerizing blue butterfly pea flower rice tossed with fresh raw indigenous herbs, toasted grated coconut, fish cracker, and crispy salted duck egg!', tag: 'Pea Flower Blue 🍚💙', colors: ['#f0f9ff', '#e0f2fe', '#0284c7', '#0369a1'] } // blue/sky theme
    ];

    // Generic random food emojis for customized dishes added by users
    const randomEmojis = ['🍕', '🍔', '🍟', '🌭', '🍗', '🍜', '🍤', '🍣', '🥟', '🥪', '🌮', '🌯', '🥗', '🥘', '🍲', '🍰', '🍩', '🍪', '🧇'];

    let dishes = [...defaultDishes];

    // Load custom array from localStorage if available
    try {
      const stored = localStorage.getItem('apa_nak_makan_list');
      if (stored) {
        dishes = JSON.parse(stored);
      }
    } catch (e) {
      console.warn("Could not retrieve stored dishes", e);
    }

    const appBody = document.getElementById('app-body');
    const pickBtn = document.getElementById('pick-btn');
    const instructions = document.getElementById('instructions');
    const emojiDisplay = document.getElementById('emoji-display');
    const textDisplay = document.getElementById('text-display');
    const infoBox = document.getElementById('info-box');
    const dishTag = document.getElementById('dish-tag');
    const dishDescription = document.getElementById('dish-description');
    const btnMaps = document.getElementById('btn-maps');
    const btnCopy = document.getElementById('btn-copy');
    
    // Drawer components
    const toggleDrawerBtn = document.getElementById('toggle-drawer-btn');
    const drawerArrow = document.getElementById('drawer-arrow');
    const drawerContent = document.getElementById('drawer-content');
    const chipsGrid = document.getElementById('chips-grid');
    const addFoodForm = document.getElementById('add-food-form');
    const inputNewFood = document.getElementById('input-new-food');
    const totalActiveCountSpan = document.getElementById('total-active-count');
    const btnResetMenu = document.getElementById('btn-reset-menu');

    let isRolling = false;
    let isDrawerOpen = false;

    // --- AUDIO SYNTHESIS SYSTEM ---
    let audioCtx = null;
    function playTone(freq, duration, type = 'sine', volume = 0.08) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
        // Exponential decay so it feels natural
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (err) {
        console.warn("Audio Context audio block", err);
      }
    }

    // Play triumphant select chord
    function playVictoryChord() {
      // Major Chord
      playTone(523.25, 0.25, 'sine', 0.12); // C5
      setTimeout(() => playTone(659.25, 0.25, 'sine', 0.12), 80); // E5
      setTimeout(() => {
        playTone(783.99, 0.45, 'sine', 0.15); // G5
        playTone(1046.50, 0.45, 'sine', 0.10); // C6 (High Octave shine)
      }, 160);
    }

    // --- CONFETTI PARTICLE SYSTEM ---
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2 + 30;
        const angle = -Math.PI / 4 - Math.random() * Math.PI / 2; // Upward spray arc
        const speed = Math.random() * 6 + 4;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 1.5;
        this.size = Math.random() * 6 + 3;
        
        // Vibrant neon colors
        const colors = ['#f97316', '#ff007f', '#eab308', '#22c55e', '#06b6d4', '#ec4899', '#a855f7', '#6366f1'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.015;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.18; // gravity
        this.vx *= 0.98; // atmospheric drag
        this.alpha -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        // Draw round and diamond confetti shapes
        ctx.beginPath();
        if (Math.random() > 0.5) {
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        } else {
          ctx.rect(this.x, this.y, this.size, this.size);
        }
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnExplosion() {
      particles = [];
      for (let i = 0; i < 90; i++) {
        particles.push(new Particle());
      }
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, idx) => {
        p.update();
        p.draw();
        if (p.alpha <= 0) {
          particles.splice(idx, 1);
        }
      });
      if (particles.length > 0) {
        animationId = requestAnimationFrame(animateConfetti);
      }
    }

    // --- REBUILD PREFERENCES DRAWER UI ---
    function saveAndRebuildDrawer() {
      try {
        localStorage.setItem('apa_nak_makan_list', JSON.stringify(dishes));
      } catch (e) {
        console.warn("Storage limits hit", e);
      }

      const activeCount = dishes.filter(d => d.enabled !== false).length;
      totalActiveCountSpan.textContent = activeCount;

      chipsGrid.innerHTML = '';
      dishes.forEach((dish, idx) => {
        const isEnabled = dish.enabled !== false;
        
        const chip = document.createElement('button');
        chip.id = `food-chip-${idx}`;
        chip.type = 'button';
        chip.className = `inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-semibold cursor-pointer select-none transition-all border duration-150 ${
          isEnabled 
            ? 'bg-gradient-to-r from-orange-50 to-amber-50 text-orange-700 border-orange-200/60 shadow-sm' 
            : 'bg-slate-100/70 text-slate-400 border-slate-200 opacity-55 hover:opacity-80 line-through'
        }`;
        
        chip.innerHTML = `<span>${dish.emoji}</span> <span class="tracking-tight">${dish.name}</span>`;
        
        // Click toggles state
        chip.addEventListener('click', () => {
          if (isRolling) return;
          // Toggle enabled logic
          dish.enabled = !isEnabled;
          
          playTone(300, 0.05, 'triangle', 0.05);
          saveAndRebuildDrawer();
        });

        chipsGrid.appendChild(chip);
      });
    }

    // Toggle drawer callback
    toggleDrawerBtn.addEventListener('click', () => {
      isDrawerOpen = !isDrawerOpen;
      if (isDrawerOpen) {
        drawerContent.style.maxHeight = '500px';
        drawerArrow.textContent = '▲';
        drawerArrow.className = 'text-orange-500 duration-300 inline-block transform rotate-180';
      } else {
        drawerContent.style.maxHeight = '0px';
        drawerArrow.textContent = '▼';
        drawerArrow.className = 'text-slate-505 duration-300 inline-block transform rotate-0';
      }
    });

    // Custom form submit callback
    addFoodForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const foodName = inputNewFood.value.trim();
      if (!foodName) return;

      const randomEmoji = randomEmojis[Math.floor(Math.random() * randomEmojis.length)];
      
      const newDish = {
        name: foodName,
        emoji: randomEmoji,
        desc: `Freshly added local gourmet: ${foodName}! A tailored favorite cooked especially for you. Ready to satisfy your hunger!`,
        tag: 'Gourmet Custom 🍽️',
        colors: ['#fff7ed', '#ffedd5', '#f97316', '#ea580c'], // soft orange/red matching
        enabled: true
      };

      dishes.push(newDish);
      inputNewFood.value = '';
      
      playTone(600, 0.1, 'sine', 0.08);
      saveAndRebuildDrawer();
    });

    // Reset Menu
    btnResetMenu.addEventListener('click', () => {
      if (confirm('Tolak semua menu buatan sendiri dan kembali ke asal?')) {
        dishes = [...defaultDishes];
        playTone(200, 0.15, 'sawtooth', 0.05);
        saveAndRebuildDrawer();
      }
    });

    // Share result feature
    let lastPickedDish = null;
    btnCopy.addEventListener('click', () => {
      if (!lastPickedDish) return;
      const copyText = `Apa nak makan tonight? ${lastPickedDish.emoji} ${lastPickedDish.name}! Selected randomly to fix our craving! 🇲🇾✨`;
      
      navigator.clipboard.writeText(copyText).then(() => {
        const defaultText = btnCopy.innerHTML;
        btnCopy.innerHTML = '✅ Berjaya Disalin!';
        btnCopy.className = 'inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 text-white font-semibold text-xs rounded-lg transition-colors border border-emerald-600 shadow-sm cursor-pointer';
        playTone(880, 0.08, 'sine', 0.1);
        setTimeout(() => {
          btnCopy.innerHTML = defaultText;
          btnCopy.className = 'inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold text-xs rounded-lg transition-colors border border-emerald-200/50 shadow-sm cursor-pointer';
        }, 1500);
      });
    });

    // --- MAIN ROLLING ENGINE ---
    pickBtn.addEventListener('click', () => {
      if (isRolling) return;

      // Filter active pool
      const activePool = dishes.filter(d => d.enabled !== false);
      if (activePool.length === 0) {
        alert("Ehh! Sila aktifkan paling kurang satu jenis makanan dalam menu di bawah! 🤔");
        return;
      }

      isRolling = true;
      lastPickedDish = null;
      
      // Close settings drawer during roll to maximize screen space
      if (isDrawerOpen) {
        toggleDrawerBtn.click();
      }

      // Hide results cards during roll
      instructions.innerHTML = '';
      instructions.style.display = 'none';
      emojiDisplay.className = 'text-8xl mb-3 transition-transform duration-75 scale-90 opacity-70';
      textDisplay.className = 'text-2xl font-extrabold text-slate-400 tracking-tight transition-all duration-75';
      
      infoBox.style.maxHeight = '0px';
      infoBox.style.opacity = '0';
      
      // Dynamic background reset to pale color during rolling
      appBody.classList.replace(appBody.classList[0] || 'bg-gradient-to-tr', 'bg-gradient-to-tr');
      appBody.style.background = ''; 

      let count = 0;
      const totalSteps = 16 + Math.floor(Math.random() * 8); // Shuffle steps
      
      const interval = setInterval(() => {
        // Pick random fast item
        const temp = activePool[Math.floor(Math.random() * activePool.length)];
        emojiDisplay.textContent = temp.emoji;
        textDisplay.textContent = temp.name;
        
        // Speed tick sounds
        playTone(380 + (count * 15), 0.04, 'triangle', 0.08);

        count++;
        if (count >= totalSteps) {
          clearInterval(interval);
          
          // Final Decisive Pick!
          const final = activePool[Math.floor(Math.random() * activePool.length)];
          lastPickedDish = final;

          emojiDisplay.textContent = final.emoji;
          textDisplay.textContent = final.name;
          
          // Dynamic descriptions and attributes
          dishTag.textContent = final.tag || 'Mouthwatering Goodness ✨';
          dishDescription.textContent = final.desc || 'A delightfully fragrant and satisfying meal picked just for your taste buds today!';
          
          // Set Maps search href
          btnMaps.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(final.name + ' near me malaysia')}`;

          // Visual pop entrance with bounce classes
          emojiDisplay.className = 'text-8xl mb-3 transition-all duration-500 scale-125 rotate-6 animate-bounce z-10 relative';
          textDisplay.className = 'text-4xl font-extrabold text-orange-600 tracking-tight transition-all duration-300 opacity-100 scale-105 z-10 relative';
          
          // Reveal secondary card instructions and copy tools
          infoBox.style.maxHeight = '250px';
          infoBox.style.opacity = '1';

          // Trigger Particle Explosion Effects inside the glass box
          resizeCanvas();
          spawnExplosion();
          if (animationId) cancelAnimationFrame(animationId);
          animateConfetti();

          // Play Sound Chord
          playVictoryChord();

          // Change entire background room color beautifully to match the selected food!
          if (final.colors && final.colors.length >= 4) {
            // Apply gradient dynamically
            appBody.style.background = `linear-gradient(135deg, ${final.colors[0]} 0%, ${final.colors[1]} 50%, ${final.colors[2]}22 100%)`;
          } else {
            appBody.style.background = 'linear-gradient(135deg, #fffbeb 0%, #ffedd5 50%, #fed7aa 100%)';
          }

          isRolling = false;
        }
      }, 70 + (count * 6)); // Gradually slows down
    });

    // Initialize tray chips
    saveAndRebuildDrawer();
  </script>
</body>
</html>
